name: Validate Plugins

on:
  pull_request:
    paths:
      - 'plugins/**'
      - 'external_plugins/**'
      - '.claude-plugin/marketplace.json'
  push:
    branches: [main]

jobs:
  validate-json:
    name: Validate JSON manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check marketplace.json parses
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          echo "marketplace.json is valid JSON"

      - name: Check every plugin.json parses
        run: |
          set -e
          fail=0
          for manifest in plugins/*/.claude-plugin/plugin.json plugins/*/.codex-plugin/plugin.json external_plugins/*/.claude-plugin/plugin.json external_plugins/*/.codex-plugin/plugin.json; do
            if [ -f "$manifest" ]; then
              if python3 -c "import json; json.load(open('$manifest'))" 2>/dev/null; then
                echo "OK: $manifest"
              else
                echo "FAIL: $manifest (invalid JSON)"
                fail=1
              fi
            fi
          done
          exit $fail

      - name: Check every .mcp.json parses
        run: |
          set -e
          fail=0
          for mcp in plugins/*/.mcp.json external_plugins/*/.mcp.json; do
            if [ -f "$mcp" ]; then
              if python3 -c "import json; json.load(open('$mcp'))" 2>/dev/null; then
                echo "OK: $mcp"
              else
                echo "FAIL: $mcp (invalid JSON)"
                fail=1
              fi
            fi
          done
          exit $fail

  validate-structure:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Every plugin has both manifests
        run: |
          set -e
          fail=0
          for plugin_dir in plugins/*/ external_plugins/*/; do
            if [ -d "$plugin_dir" ]; then
              if [ ! -f "${plugin_dir}.claude-plugin/plugin.json" ]; then
                echo "FAIL: ${plugin_dir} missing .claude-plugin/plugin.json"
                fail=1
              fi
              if [ ! -f "${plugin_dir}.codex-plugin/plugin.json" ]; then
                echo "FAIL: ${plugin_dir} missing .codex-plugin/plugin.json"
                fail=1
              fi
              if [ ! -f "${plugin_dir}README.md" ]; then
                echo "FAIL: ${plugin_dir} missing README.md"
                fail=1
              fi
            fi
          done
          exit $fail

  no-mock-data:
    name: Banned pattern check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject mock-data patterns in plugin code
        run: |
          set -e
          fail=0
          # Scan plugin folders for banned patterns
          if grep -rn "Math\.random()" plugins/ external_plugins/ 2>/dev/null | grep -v '\.github/'; then
            echo "FAIL: Math.random() found in plugin code"
            fail=1
          fi
          if grep -rn "mockData\|mockGames\|mockStandings\|mockTeams\|mockScores" plugins/ external_plugins/ 2>/dev/null | grep -v '\.github/'; then
            echo "FAIL: mock data pattern found in plugin code"
            fail=1
          fi
          exit $fail

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all markdown files are readable
        run: |
          set -e
          for md in $(find plugins/ external_plugins/ docs/ -name "*.md" 2>/dev/null); do
            if [ ! -s "$md" ]; then
              echo "FAIL: $md is empty"
              exit 1
            fi
            echo "OK: $md"
          done
